services:
  postgres:
    image: postgres:16
    container_name: alphamind-postgres
    restart: unless-stopped
    environment:
      POSTGRES_DB: alphamind
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
    ports:
      - "5432:5432"
    volumes:
      - postgres-data:/var/lib/postgresql/data

  redis:
    image: redis:7-alpine
    container_name: alphamind-redis
    restart: unless-stopped
    ports:
      - "6379:6379"

  backend:
    build:
      context: ./backend
    container_name: alphamind-backend
    restart: unless-stopped
    depends_on:
      - postgres
      - redis
    environment:
      DB_USERNAME: postgres
      DB_PASSWORD: postgres
      SPRING_DATASOURCE_URL: jdbc:postgresql://postgres:5432/alphamind
      SPRING_DATA_REDIS_HOST: redis
      SPRING_DATA_REDIS_PORT: 6379
      CORS_ALLOWED_ORIGINS: http://localhost:3000
      FETCH_REAL_DATA: "true"
      OPENAI_API_KEY: ${OPENAI_API_KEY:-}
      DEEPSEEK_API_KEY: ${DEEPSEEK_API_KEY:-}
      ANTHROPIC_API_KEY: ${ANTHROPIC_API_KEY:-}
    ports:
      - "8080:8080"

  frontend:
    build:
      context: ./frontend
    container_name: alphamind-frontend
    restart: unless-stopped
    depends_on:
      - backend
    environment:
      BACKEND_API_ORIGIN: http://backend:8080
    ports:
      - "3000:3000"

volumes:
  postgres-data:
