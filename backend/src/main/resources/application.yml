server:
  port: 8080

spring:
  application:
    name: alphamind-backend

  # MySQL Database
  datasource:
    url: jdbc:mysql://localhost:3306/alphamind?useUnicode=true&characterEncoding=utf8&useSSL=false&serverTimezone=Asia/Shanghai
    username: root
    password: ${DB_PASSWORD:root123}
    driver-class-name: com.mysql.cj.jdbc.Driver

  jpa:
    hibernate:
      ddl-auto: update
    show-sql: false
    properties:
      hibernate:
        dialect: org.hibernate.dialect.MySQLDialect
        format_sql: true

  # Redis Configuration
  data:
    redis:
      host: localhost
      port: 6379
      password: ${REDIS_PASSWORD:}
      database: 0
      timeout: 5000ms
      lettuce:
        pool:
          max-active: 8
          max-idle: 8
          min-idle: 0

  # Jackson Configuration
  jackson:
    serialization:
      write-dates-as-timestamps: false
    default-property-inclusion: non_null

# Spring AI Configuration
spring.ai:
  # OpenAI Configuration
  openai:
    api-key: ${OPENAI_API_KEY:}
    base-url: ${OPENAI_BASE_URL:https://api.openai.com}
    chat:
      options:
        model: gpt-4o
        temperature: 0.7
        max-tokens: 4096

  # DeepSeek Configuration
  deepseek:
    api-key: ${DEEPSEEK_API_KEY:}
    base-url: https://api.deepseek.com
    chat:
      options:
        model: deepseek-chat
        temperature: 0.7
        max-tokens: 4096

  # Anthropic Configuration (for Claude)
  anthropic:
    api-key: ${ANTHROPIC_API_KEY:}
    base-url: https://api.anthropic.com
    chat:
      options:
        model: claude-sonnet-4-20250514
        temperature: 0.7
        max-tokens: 4096

# AlphaMind Application Configuration
alphamind:
  # LLM Provider Selection
  llm:
    primary-provider: openai
    fallback-providers:
      - deepseek
      - anthropic
    timeout-seconds: 120

  # Analysis Configuration
  analysis:
    max-history-recall: 5
    confidence-threshold: 0.6
    default-holding-days: 30

  # Debate Configuration
  debate:
    max-rounds: 3
    voting-threshold: 0.5
    confidence-weight: 0.4

  # SSE Configuration
  sse:
    heartbeat-interval-seconds: 30
    reconnect-enabled: true

  # Memory Configuration
  memory:
    enabled: true
    ttl-hours: 24
    vector-dimensions: 1536

# Logging
logging:
  level:
    root: INFO
    com.alphamind: DEBUG
    org.springframework.ai: DEBUG
  pattern:
    console: "%d{yyyy-MM-dd HH:mm:ss} [%thread] %-5level %logger{36} - %msg%n"
