# 开发环境配置
spring:
  # PostgreSQL 本地开发数据库
  datasource:
    url: jdbc:postgresql://localhost:5432/alphamind_dev
    username: ${DB_USERNAME:postgres}
    password: ${DB_PASSWORD:postgres}
    driver-class-name: org.postgresql.Driver

  jpa:
    hibernate:
      ddl-auto: validate
    show-sql: true
    properties:
      hibernate:
        dialect: org.hibernate.dialect.PostgreSQLDialect
        format_sql: true

  flyway:
    enabled: true
    locations: classpath:db/migration

  # Redis配置 - 开发环境可选
  data:
    redis:
      host: localhost
      port: 6379
      password:
      database: 0

  main:
    allow-bean-definition-overriding: true

# Spring AI - 开发环境
spring.ai:
  openai:
    api-key: ${OPENAI_API_KEY:demo-key}
    base-url: https://api.openai.com
  deepseek:
    api-key: ${DEEPSEEK_API_KEY:demo-key}
  anthropic:
    api-key: ${ANTHROPIC_API_KEY:demo-key}

logging:
  level:
    com.alphamind: DEBUG
    org.springframework.web: DEBUG
